<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="/assets/main.css">
  </head>
  <body>
    <div>
      {%- include header.html fontfamily="Raleway SemiBold" colorfondo="#ffcc33" anchoheader="100%" ancho="60%" margenderecho="auto" margenizquierdo="auto"-%}

      <div class="wrapper">
        <a href="{{ "/" | relative_url }}" style="background-color: #ffcc33; border-bottom: 2px solid #ccc; color: #333; padding: 0.5em;">Inicio</a>
      
      <h2 class="post-title" style="margin-top: 1.2em;">{{ page.title }}</h2>
      <div class="page-content" style="font-size: 1.2em;">
        {{ content }}
      </div>
    </div>
    </div>
    <footer style="background-color: #ffcc33;" class="site-footer">
      <div class="wrapper">
        <p>&copy; {{ "now" | date: "%Y" }} <br>
          <a href="https://ivanjvic.github.io/website"> &#64{{ site.twitter_username }}</a><br>
        </p>
      </div>
    </footer>

  </body>
  </html>
